<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runtime Check</title>
  <style>
    body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin: 24px; white-space: pre-wrap; }
    iframe { width: 1200px; height: 900px; border: 1px solid #ccc; display: block; margin-top: 16px; }
  </style>
</head>
<body>
  <div id="log">laedt...</div>
  <iframe id="frame"></iframe>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug") || "mikro1";
    const frame = document.getElementById("frame");
    const log = document.getElementById("log");
    frame.src = `/${slug}/index.html?qa=${Date.now()}`;

    function waitFor(condition, timeout = 12000, step = 100) {
      const start = Date.now();
      return new Promise((resolve, reject) => {
        const tick = () => {
          try {
            if (condition()) return resolve();
          } catch {}
          if (Date.now() - start >= timeout) return reject(new Error("timeout"));
          setTimeout(tick, step);
        };
        tick();
      });
    }

    frame.addEventListener("load", async () => {
      try {
        await waitFor(() => frame.contentWindow?.__jsLoaded);
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        const firstId = doc.querySelector(".nav-item[data-id]")?.dataset?.id;
        if (firstId && typeof win.__navigate === "function") {
          win.__navigate(firstId);
        }
        await waitFor(() => doc.querySelector("#tabRow button[data-tab='aufgaben']"));
        doc.querySelector("#tabRow button[data-tab='aufgaben']")?.click();
        await new Promise((resolve) => setTimeout(resolve, 800));
        log.textContent = win.__lastRenderError || "ok";
      } catch (error) {
        log.textContent = String(error?.stack || error);
      }
    }, { once: true });
  </script>
</body>
</html>

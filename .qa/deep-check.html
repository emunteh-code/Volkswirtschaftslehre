<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Portal QA</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #f6f6fb;
      color: #17171c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.1), transparent 28%),
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.08), transparent 25%),
        #f6f6fb;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 20px;
      color: #5b6170;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    body.single .grid {
      grid-template-columns: minmax(0, 1fr);
      max-width: 1480px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(130, 140, 170, 0.22);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(25, 28, 38, 0.08);
      min-height: 660px;
    }

    body.single .card {
      min-height: 1000px;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(130, 140, 170, 0.18);
      background: rgba(249, 250, 254, 0.92);
    }

    .title {
      font-size: 15px;
      font-weight: 700;
    }

    .state {
      font-family: "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 11px;
      color: #5b6170;
      white-space: nowrap;
    }

    iframe {
      display: block;
      width: 100%;
      height: 610px;
      border: 0;
      background: white;
    }

    body.single iframe {
      height: 920px;
    }
  </style>
</head>
<body>
  <h1>Deep Portal QA</h1>
  <p>Each frame opens one portal, enters the first concept, and prefers <code>Grafik</code>, then <code>Aufgaben</code>, then <code>Theorie</code>.</p>
  <div class="grid" id="grid"></div>

  <script>
    const defaultSlugs = [
      "mikro1",
      "makro1",
      "makro2",
      "statistik",
      "oekonometrie",
      "mathematik",
      "finanzwirtschaft",
      "internationale-wirtschaftsbeziehungen",
      "jahresabschluss",
      "recht",
      "r"
    ];
    const params = new URLSearchParams(window.location.search);
    const requestedSlug = params.get("slug");
    const requestedConcept = params.get("concept");
    const requestedTab = params.get("tab");
    const requestedMode = params.get("mode") || "concept";
    const slugs = requestedSlug ? [requestedSlug] : defaultSlugs;

    function createCard(slug) {
      const card = document.createElement("section");
      card.className = "card";
      card.innerHTML = `
        <div class="meta">
          <div class="title">${slug}</div>
          <div class="state" id="state-${slug}">lädt...</div>
        </div>
      `;
      const iframe = document.createElement("iframe");
      iframe.src = `/${slug}/index.html?qa=${Date.now()}`;
      iframe.loading = "eager";
      card.appendChild(iframe);
      return { card, iframe };
    }

    async function waitFor(condition, timeout = 8000, step = 120) {
      const start = Date.now();
      return new Promise((resolve, reject) => {
        const tick = () => {
          try {
            if (condition()) return resolve(true);
          } catch {}
          if (Date.now() - start >= timeout) return reject(new Error("timeout"));
          setTimeout(tick, step);
        };
        tick();
      });
    }

    async function driveFrame(slug, iframe) {
      const state = document.getElementById(`state-${slug}`);
      try {
        await waitFor(() => iframe.contentWindow?.__jsLoaded, 12000);
        const doc = iframe.contentDocument;
        const win = iframe.contentWindow;
        const clickNode = (node) => {
          if (!node) return;
          node.dispatchEvent(new win.MouseEvent("click", {
            bubbles: true,
            cancelable: true,
            view: win
          }));
        };

        if (requestedMode === "rlab") {
          if (typeof win.__renderHome === "function") {
            win.__renderHome();
          }

          const mount = await waitFor(() =>
            doc.getElementById("generatedRLabMount") || doc.getElementById("rLabMount"),
            7000
          ).then(() => doc.getElementById("generatedRLabMount") || doc.getElementById("rLabMount"));

          mount?.scrollIntoView({ block: "start", behavior: "instant" });

          await waitFor(() => doc.querySelector("[data-lesson-id]"), 5000);
          const lessonButtons = Array.from(doc.querySelectorAll("[data-lesson-id]"));
          clickNode(lessonButtons[1] || lessonButtons[0]);
          await waitFor(() => doc.querySelector("#labEditor") && doc.querySelector('[data-action="check"]'), 4000);
          await new Promise((resolve) => setTimeout(resolve, 250));

          clickNode(doc.querySelector('[data-action="hint"]'));
          await new Promise((resolve) => setTimeout(resolve, 180));

          clickNode(doc.querySelector('[data-action="check"]'));
          await waitFor(() => {
            const output = doc.querySelector("#labOutput");
            return output && !String(output.textContent || "").includes("[Output erscheint hier");
          }, 6000).catch(() => {});

          mount?.scrollIntoView({ block: "start", behavior: "instant" });
          await new Promise((resolve) => setTimeout(resolve, 900));
          state.textContent = "ok · rlab";
          return;
        }

        const targetId = requestedConcept || doc.querySelector(".nav-item[data-id]")?.dataset?.id;
        if (targetId && typeof win.__navigate === "function") {
          win.__navigate(targetId);
        }
        await waitFor(() => doc.querySelector("#content .card, #content .split, #content .concept-header"), 5000);
        if (requestedTab) {
          await waitFor(() => {
            const button = doc.querySelector(`#tabRow button[data-tab="${requestedTab}"]`);
            return button && !button.hidden;
          }, 5000).catch(() => {});
        }

        const preferredTabs = requestedTab ? [requestedTab] : ["grafik", "aufgaben", "theorie"];
        let chosen = "theorie";
        for (const tab of preferredTabs) {
          const button = doc.querySelector(`#tabRow button[data-tab="${tab}"]`);
          if (button && !button.hidden) {
            button.click();
            chosen = tab;
            break;
          }
        }
        if (chosen === "grafik") {
          await waitFor(() => doc.querySelector("canvas, svg"), 4000).catch(() => {});
        }
        await new Promise((resolve) => setTimeout(resolve, 900));
        state.textContent = `ok · ${chosen}`;
      } catch (error) {
        state.textContent = `fehler · ${error.message}`;
      }
    }

    if (requestedSlug) document.body.classList.add("single");

    const grid = document.getElementById("grid");
    const entries = slugs.map((slug) => {
      const entry = createCard(slug);
      grid.appendChild(entry.card);
      return { slug, ...entry };
    });

    function mountDriver(slug, iframe) {
      let fired = false;
      const run = () => {
        if (fired) return;
        fired = true;
        driveFrame(slug, iframe);
      };

      iframe.addEventListener("load", run, { once: true });

      const readyState = iframe.contentDocument?.readyState;
      if (readyState === "interactive" || readyState === "complete") {
        window.setTimeout(run, 60);
      }
    }

    entries.forEach(({ slug, iframe }) => mountDriver(slug, iframe));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ökonometrie QA Harness</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #111; color: #fff; }
    #meta { padding: 10px 14px; background: #16181c; border-bottom: 1px solid #333; font-size: 13px; }
    #summary { white-space: pre-wrap; font-family: ui-monospace, monospace; margin-top: 8px; color: #cfe3ff; }
    iframe { width: 1600px; height: 2200px; border: none; display: block; margin: 0 auto; background: white; }
  </style>
</head>
<body>
  <div id="meta">
    <div id="status">Booting…</div>
    <div id="summary"></div>
  </div>
  <iframe id="frame" src="/oekonometrie/index.html?qa=1"></iframe>
  <script>
    localStorage.setItem('oekonometrie_consent_v2', '1');

    const params = new URLSearchParams(location.search);
    const targetConcept = params.get('concept');
    const targetTab = params.get('tab');
    const targetMode = params.get('mode');
    const targetExam = params.get('exam');
    const shouldRunR = params.get('runR') === '1';

    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const frame = document.getElementById('frame');

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    async function waitFor(predicate, timeout = 15000) {
      const start = Date.now();
      while (Date.now() - start < timeout) {
        if (predicate()) return true;
        await sleep(120);
      }
      throw new Error('Timeout waiting for runtime condition');
    }

    async function boot() {
      const win = frame.contentWindow;
      await waitFor(() => win && win.__jsLoaded && typeof win.__renderHome === 'function' && typeof win.__navigate === 'function');
      await sleep(400);

      const collectSummary = () => {
        const doc = win.document;
        const visibleText = doc.body.textContent || '';
        const rBlocks = [...doc.querySelectorAll('#content [data-r-practice-root]')];
        const runtimeStatuses = rBlocks.map((block) => block.querySelector('[data-r-runtime-status]')?.textContent?.trim()).filter(Boolean);
        return {
          concept: targetConcept || 'home',
          tab: targetMode || targetTab || 'theorie',
          pageTitle: (doc.querySelector('#content h1, #content h2')?.textContent || '').trim(),
          homeCards: doc.querySelectorAll('.home-card').length,
          sectionBlocks: doc.querySelectorAll('#content .section-block').length,
          formulaCards: doc.querySelectorAll('#content .formula-card').length,
          problemCards: doc.querySelectorAll('#content .problem-card').length,
          fullExamQuestions: doc.querySelectorAll('#content .fe-question').length,
          rBlocks: doc.querySelectorAll('#content .r-application-block').length,
          rPracticeBlocks: rBlocks.length,
          rLiveBlocks: rBlocks.filter((block) => block.dataset.runtimeMode === 'live').length,
          rGuidedBlocks: rBlocks.filter((block) => block.dataset.runtimeMode === 'guided').length,
          rRuntimeStatuses: runtimeStatuses,
          rOutputPreview: (doc.querySelector('#content [data-r-output]')?.textContent || '').trim().slice(0, 280),
          graphLegends: doc.querySelectorAll('#content .graph-legend-item, #content .graph-legend li').length,
          masteryItems: doc.querySelectorAll('#content .mastery-checklist li, #content .mastery-item').length,
          graphCanvas: !!doc.getElementById('graph_canvas'),
          rightPanelSections: doc.querySelectorAll('#rightPanel .rp-section:not([hidden])').length,
          rightPanelText: (doc.getElementById('rightPanel')?.textContent || '').trim().slice(0, 240),
          mathError: visibleText.includes('Math input error'),
          rawDelimiters: visibleText.includes('$$'),
          entityLeak: /&gt;|&lt;|&amp;/.test(visibleText),
          markupLeak: /<span|<\/span|<div|<\/div|<mjx/.test(visibleText),
          hasTransfer: visibleText.includes('Transferpfad'),
          hasExamDrill: visibleText.includes('Prüfungstransfer'),
          hasGuidedTasks: visibleText.includes('Geführte Aufgaben')
        };
      };

      const triggerRPracticeRun = async () => {
        const doc = win.document;
        const runBtn = doc.querySelector('#content [data-r-action="run"]:not([disabled])');
        if (!runBtn) return false;
        const output = doc.querySelector('#content [data-r-output]');
        const before = output?.textContent || '';
        runBtn.click();
        await waitFor(() => {
          const runtime = doc.querySelector('#content [data-r-runtime-status]')?.textContent || '';
          const nextOutput = output?.textContent || '';
          return runtime.includes('WebR aktiv')
            || runtime.includes('Fallback')
            || nextOutput !== before;
        }, 20000);
        await sleep(600);
        return true;
      };

      if (targetMode === 'full-module') {
        const { CURRICULUM } = await import('/oekonometrie/js/data/curriculum.js');
        const tabs = ['theorie', 'formeln', 'aufgaben', 'intuition'];
        const failures = [];
        const checked = [];

        for (const concept of CURRICULUM) {
          win.__navigate(concept.id);
          await sleep(850);

          for (const tab of tabs) {
            if (tab !== 'theorie') {
              const btn = win.document.querySelector(`#tabRow [data-tab="${tab}"]`);
              if (btn) {
                btn.click();
                await sleep(750);
              }
            }

            const summary = collectSummary();
            summary.concept = concept.id;
            summary.tab = tab;
            checked.push(summary);

            if (
              summary.mathError ||
              summary.rawDelimiters ||
              summary.entityLeak ||
              summary.markupLeak ||
              (tab === 'theorie' && summary.sectionBlocks < 2) ||
              (tab === 'formeln' && summary.formulaCards < 1) ||
              (tab === 'aufgaben' && summary.problemCards < 1) ||
              (tab === 'intuition' && summary.sectionBlocks < 1)
            ) {
              failures.push(summary);
            }
          }

          if (concept.graph) {
            const btn = win.document.querySelector('#tabRow [data-tab="graph"]');
            if (btn) {
              btn.click();
              await sleep(900);
              const summary = collectSummary();
              summary.concept = concept.id;
              summary.tab = 'graph';
              checked.push(summary);

              if (
                summary.mathError ||
                summary.rawDelimiters ||
                summary.entityLeak ||
                summary.markupLeak ||
                !summary.graphCanvas
              ) {
                failures.push(summary);
              }
            }
          }
        }

        const summary = {
          mode: 'full-module',
          checkedConcepts: CURRICULUM.length,
          checkedSurfaces: checked.length,
          failureCount: failures.length,
          failures: failures.slice(0, 40)
        };

        statusEl.textContent = `Ready: ${summary.mode}`;
        summaryEl.textContent = JSON.stringify(summary, null, 2);
        document.body.dataset.ready = '1';
        return;
      }

      if (targetMode === 'full-exams-all') {
        const { FULL_EXAMS } = await import('/oekonometrie/js/data/fullExams.js');
        const failures = [];
        const checked = [];

        for (const exam of Object.values(FULL_EXAMS)) {
          win.__startFullExam(exam.id);
          await sleep(950);
          const summary = collectSummary();
          summary.exam = exam.id;
          checked.push(summary);

          if (
            summary.mathError ||
            summary.rawDelimiters ||
            summary.entityLeak ||
            summary.markupLeak ||
            summary.fullExamQuestions < 9
          ) {
            failures.push(summary);
          }
        }

        const summary = {
          mode: 'full-exams-all',
          checkedExams: checked.length,
          failureCount: failures.length,
          failures
        };

        statusEl.textContent = `Ready: ${summary.mode}`;
        summaryEl.textContent = JSON.stringify(summary, null, 2);
        document.body.dataset.ready = '1';
        return;
      }

      if (targetMode === 'full-exams') {
        win.__showFullExamSelect();
        await sleep(900);
      } else if (targetMode === 'full-exam' && targetExam) {
        win.__startFullExam(targetExam);
        await sleep(900);
      } else if (targetConcept) {
        win.__navigate(targetConcept);
        await sleep(900);
        if (targetTab) {
          const btn = win.document.querySelector(`#tabRow [data-tab="${targetTab}"]`);
          if (btn) {
            btn.click();
            await sleep(900);
          }
        }
        if (shouldRunR) {
          await triggerRPracticeRun();
        }
      } else {
        win.__renderHome();
        await sleep(900);
      }

      const summary = collectSummary();

      statusEl.textContent = `Ready: ${summary.concept}${targetTab ? ` / ${targetTab}` : ''}`;
      summaryEl.textContent = JSON.stringify(summary, null, 2);
      document.body.dataset.ready = '1';
    }

    frame.addEventListener('load', () => { boot().catch((error) => { statusEl.textContent = error.message; summaryEl.textContent = String(error.stack || error); }); });
  </script>
</body>
</html>

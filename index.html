<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="VWL Lernportal: Klausurvorbereitung für B.Sc. Volkswirtschaftslehre an der Universität Göttingen."
  >
  <meta name="theme-color" content="#0f1114">
  <title>VWL Lernportal | Universität Göttingen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css/portal.css">
</head>
<body data-page="landing">

  <!-- ── TOP BAR ──────────────────────────────────────────────── -->
  <header class="lp-header">
    <div class="lp-container">
      <a class="lp-brand" href="./index.html">
        <span class="lp-brand-mark">VWL</span>
        <span class="lp-brand-text">
          <strong>Lernportal</strong>
          <small>Georg-August-Universität Göttingen</small>
        </span>
      </a>
      <div class="lp-header-right">
        <span class="lp-program-badge">B.Sc. Volkswirtschaftslehre</span>
        <button id="themeToggle" class="lp-theme-btn" aria-label="Farbschema wechseln">Dunkel</button>
      </div>
    </div>
  </header>

  <!-- ── TOP SHELF / HERO ─────────────────────────────────────── -->
  <section class="lp-hero" id="heroShelf" aria-live="polite">
    <div class="lp-container lp-hero-inner">
      <div class="lp-hero-content" id="heroContent">
        <p class="lp-hero-kicker" id="heroKicker">Willkommen</p>
        <h1 class="lp-hero-title" id="heroTitle">VWL Lernportal</h1>
        <p class="lp-hero-desc" id="heroDesc">Wähle ein Modul, um mit der Klausurvorbereitung zu beginnen.</p>
        <div class="lp-hero-meta" id="heroMeta"></div>
        <a class="lp-hero-btn" id="heroBtn" href="#modules">Module erkunden</a>
      </div>
    </div>
  </section>

  <!-- ── MODULE SHELF ─────────────────────────────────────────── -->
  <section class="lp-shelf" id="modules">
    <div class="lp-container">
      <div class="lp-shelf-header">
        <h2>Module</h2>
        <span class="lp-shelf-count" id="moduleCountLabel"></span>
      </div>
      <div class="lp-shelf-grid" id="moduleGrid" role="listbox" aria-label="Module"></div>
    </div>
  </section>

  <!-- ── FOOTER ───────────────────────────────────────────────── -->
  <footer class="lp-footer">
    <div class="lp-container lp-footer-inner">
      <p>&copy; <span id="footerYear"></span> VWL Lernportal &middot; Georg-August-Universit&auml;t G&ouml;ttingen</p>
      <nav>
        <a href="#" id="showInstructions">Anleitung</a>
      </nav>
    </div>
  </footer>

  <script type="module" src="./assets/js/common.js"></script>
</body>
</html>

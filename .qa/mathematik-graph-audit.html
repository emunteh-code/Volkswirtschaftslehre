<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathematik Graph Audit</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: #f4f3f9;
      color: #17171c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(142, 36, 170, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(92, 240, 255, 0.08), transparent 24%),
        #f4f3f9;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.04;
    }

    p {
      margin: 0 0 22px;
      color: #5b6170;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(130, 140, 170, 0.2);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 42px rgba(22, 26, 37, 0.08);
      min-height: 740px;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(130, 140, 170, 0.18);
      background: rgba(249, 250, 254, 0.92);
    }

    .title {
      font-size: 15px;
      font-weight: 700;
    }

    .state {
      font-family: "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
      font-size: 11px;
      color: #5b6170;
      white-space: nowrap;
    }

    iframe {
      display: block;
      width: 100%;
      height: 680px;
      border: 0;
      background: white;
    }
  </style>
</head>
<body>
  <h1>Mathematik Graph Audit</h1>
  <p>Each frame opens Mathematik directly on one graph-bearing concept and switches to the <code>Grafik</code> tab.</p>
  <div class="grid" id="grid"></div>

  <script>
    const entries = [
      ["Funktionen und Gleichungen", "roadmap_2_einfuehrung_ii_funktionen_und_gleichungen"],
      ["LA I: Matrix-Algebra", "roadmap_4_lineare_algebra_i_matrizen_und_matrix_algebra"],
      ["LA II: Inversen und Eigenwerte", "roadmap_5_lineare_algebra_ii_masszahlen_inversen_und_eigenwerte"],
      ["Analysis I: Ableitung", "roadmap_6_analysis_i_univariate_differenzialrechnung"],
      ["Optimierung I", "roadmap_7_optimierung_i_univariate_optimierung"],
      ["Analysis II: Mehrere Variablen", "roadmap_8_analysis_ii_funktionen_mehrerer_variablen"],
      ["Optimierung II: Lagrange", "roadmap_9_optimierung_ii_multivariate_optimierung_und_lagrange"],
      ["Analysis III: Integralrechnung", "roadmap_10_analysis_iii_integralrechnung"]
    ];

    const grid = document.getElementById("grid");
    entries.forEach(([title, concept]) => {
      const card = document.createElement("section");
      card.className = "card";
      card.innerHTML = `
        <div class="meta">
          <div class="title">${title}</div>
          <div class="state">mathematik · graph</div>
        </div>
      `;
      const iframe = document.createElement("iframe");
      iframe.src = `/.qa/deep-check.html?slug=mathematik&concept=${concept}&tab=graph`;
      iframe.loading = "eager";
      card.appendChild(iframe);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
